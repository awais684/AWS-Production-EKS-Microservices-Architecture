# k8s/secrets.yaml
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: production
type: Opaque
stringData:
  DB_HOST: "your-rds-endpoint.eu-central-1.rds.amazonaws.com"
  DB_PORT: "5432"
  DB_NAME: "productiondb"
  DB_USER: "dbadmin"
  DB_PASSWORD: "your-password"   # use External Secrets Operator in production